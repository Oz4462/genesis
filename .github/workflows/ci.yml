name: CI

# Run the GENESIS test suite + lint on every push and PR to main.
# The core is pure numpy/sympy/scipy/mpmath; z3 (smt) is installed so the proof-loop
# tests run. cad/sim (cadquery/pybullet) are NOT installed — those tests honest-skip,
# never silently pass.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev + smt)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,smt]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest -q
