# Optional LIVE goldset — does NOT run on every PR (audit C2).
# Requires secrets / live backends; dry CI goldset remains mechanism-only.
name: goldset-live

on:
  workflow_dispatch:
  schedule:
    # Nightly 03:17 UTC — skipped if secrets unavailable
    - cron: "17 3 * * *"

jobs:
  live-goldset:
    runs-on: ubuntu-latest
    # Only when explicitly enabled via repository variable
    if: ${{ vars.GENESIS_RUN_LIVE_GOLDSET == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,smt]"
      - name: Live goldset
        env:
          GENESIS_ALLOW_LIVE: "1"
        run: bash scripts/nightly_goldset_live.sh
