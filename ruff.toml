# Lint baseline (ruff defaults: E4/E7/E9 + F). Kept clean by the self-improvement
# loop; run `ruff check src tests` — it must report zero findings.

[lint.per-file-ignores]
# `I` is the second moment of area — standard engineering notation in the beam
# tests; renaming it would hurt the physics readability, not improve it.
"tests/test_fem.py" = ["E741"]
# Restored humanoid package + tests: style debt, pybullet `p` rebind, optional research locals.
"src/gen/humanoids/*.py" = ["E701", "E702", "E741", "E402", "F811", "F841"]
"tests/test_humanoids_*.py" = ["F401", "E402", "F841"]
